name: Build binaries

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'build.sh'
      - 'Makefile'
      - '.github/workflows/build-binaries.yml'

permissions:
  contents: write

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build cross-platform binaries
        run: bash build.sh

      - name: Configure git identity
        run: |
          git config user.name "Piyush Garg"
          git config user.email "piyushgarg.dev@gmail.com"

      - name: Commit updated binaries
        run: |
          git add skills/tally-erp/bin/
          if git diff --cached --quiet; then
            echo "No binary changes to commit."
            exit 0
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          git commit -m "chore: rebuild tally binaries for ${SHORT_SHA} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
